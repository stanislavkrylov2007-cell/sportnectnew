openapi: 3.0.3
info:
  title: Sportnect API
  version: 1.0.0
  description: API сервиса для организации спортивных игр
  contact:
    name: Команда Sportnect
    email: support@sportnect.ru
servers:
  - url: https://api.sportnect.ru/v1
    description: Production server
tags:
  - name: games
    description: Управление играми
  - name: profile
    description: Профиль пользователя
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    PlayerLevel:
      type: string
      enum:
        - beginner
        - beginner_plus
        - intermediate_minus
        - intermediate
        - intermediate_plus
        - semipro
        - pro
    OrganizerInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        rating:
          type: number
        contacts:
          type: object
          properties:
            phone:
              type: string
            telegram:
              type: string
    Player:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        level:
          $ref: '#/components/schemas/PlayerLevel'
        rating:
          type: number
        avatarUrl:
          type: string
        gamesAsOrganizer:
          type: array
          items:
            type: object
            properties:
              gameId:
                type: string
              address:
                type: string
              datetime:
                type: string
              status:
                type: string
        gamesAsPlayer:
          type: array
          items:
            type: object
            properties:
              gameId:
                type: string
              address:
                type: string
              datetime:
                type: string
              requestStatus:
                type: string
                enum:
                  - pending
                  - confirmed
                  - declined
    GameSummary:
      type: object
      properties:
        id:
          type: string
        datetime:
          type: string
        address:
          type: string
        levelsAllowed:
          type: array
          items:
            $ref: '#/components/schemas/PlayerLevel'
        ratingRequired:
          type: number
        status:
          type: string
          enum:
            - open
            - full
            - cancelled
            - finished
        priceRub:
          type: integer
        durationMinutes:
          type: integer
    GameDetails:
      type: object
      properties:
        id:
          type: string
        datetime:
          type: string
        durationMinutes:
          type: integer
        address:
          type: string
        levelsAllowed:
          type: array
          items:
            $ref: '#/components/schemas/PlayerLevel'
        ratingRequired:
          type: number
        priceRub:
          type: integer
        currentPlayers:
          type: integer
        maxPlayers:
          type: integer
        organizer:
          $ref: '#/components/schemas/OrganizerInfo'
        players:
          type: array
          items:
            type: object
            properties:
              playerId:
                type: string
              name:
                type: string
              level:
                $ref: '#/components/schemas/PlayerLevel'
              rating:
                type: number
              status:
                type: string
        description:
          type: string
        status:
          type: string
          enum:
            - open
            - full
            - cancelled
            - finished
    GamesListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GameSummary'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    OkResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
        message:
          type: string
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
paths:
  /api/games:
    get:
      tags:
        - games
      operationId: listGames
      summary: Список игр с фильтрацией и пагинацией
      security:
        - bearerAuth: []
      parameters:
        - name: datetime_from
          in: query
          required: false
          schema:
            type: string
        - name: address
          in: query
          required: false
          schema:
            type: string
        - name: level
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PlayerLevel'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Список игр
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamesListResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/games/{gameId}:
    get:
      tags:
        - games
      operationId: getGameDetails
      summary: Детали игры (карточка)
      security:
        - bearerAuth: []
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Детали игры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameDetails'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Игра не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/games/{gameId}/join:
    post:
      tags:
        - games
      operationId: joinGame
      summary: Записаться на игру
      security:
        - bearerAuth: []
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Заявка отправлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: >-
            Нельзя записаться (нет мест / уровень не подходит / рейтинг слишком
            низкий)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Игра не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Игрок уже подал заявку
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/games/{gameId}/cancel:
    delete:
      tags:
        - games
      operationId: cancelGame
      summary: Отменить свою запись на игру
      security:
        - bearerAuth: []
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Запись отменена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Запись не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/profile:
    get:
      tags:
        - profile
      operationId: getProfile
      summary: Мой профиль
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Профиль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Player'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/profile/games:
    get:
      tags:
        - profile
      operationId: getUserGames
      summary: Игры пользователя (с фильтром по роли)
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          required: true
          schema:
            type: string
            enum:
              - organizer
              - player
      responses:
        '200':
          description: Список игр
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    gameId:
                      type: string
                    address:
                      type: string
                    datetime:
                      type: string
                    status:
                      type: string
                    requestStatus:
                      type: string
        '400':
          description: Не указан role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
